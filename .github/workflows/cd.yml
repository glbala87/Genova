# ============================================================================
# Genova – Continuous Deployment Pipeline
# ============================================================================
# Triggered on semver tag pushes (v*). Builds release artifacts, deploys to
# staging, then production with manual approval.
#
# Status badge:
#   ![CD](https://github.com/genova-team/genova/actions/workflows/cd.yml/badge.svg)

name: CD

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.10"
  POETRY_VERSION: "1.7.1"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  HELM_CHART_PATH: deploy/helm
  HELM_RELEASE_NAME: genova

jobs:
  # ── Release ───────────────────────────────────────────────────────────────
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      packages: write
    outputs:
      version: ${{ steps.version.outputs.version }}
      image_tag: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: ${{ env.POETRY_VERSION }}
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache Poetry virtualenv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-release-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-${{ hashFiles('poetry.lock') }}
          restore-keys: |
            venv-release-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Build Python package
        run: poetry build

      - name: Verify package
        run: |
          python -m venv /tmp/verify-install
          /tmp/verify-install/bin/pip install dist/*.whl
          /tmp/verify-install/bin/python -c "import genova; print(f'genova {genova.__version__}')"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/docker/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Genova ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
          files: |
            dist/*.whl
            dist/*.tar.gz

  # ── Deploy to Staging ─────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: release
    permissions:
      contents: read
    environment:
      name: staging
      url: https://staging.genova-genomics.org
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Configure kubectl for staging
        uses: azure/k8s-set-context@v4
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.STAGING_KUBECONFIG }}

      - name: Deploy to staging via Helm
        run: |
          helm upgrade --install ${{ env.HELM_RELEASE_NAME }} \
            ${{ env.HELM_CHART_PATH }} \
            --namespace genova-staging \
            --create-namespace \
            --set image.repository=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }} \
            --set image.tag=${{ needs.release.outputs.version }} \
            --set environment=staging \
            --values ${{ env.HELM_CHART_PATH }}/values.yaml \
            --wait \
            --timeout 10m

      - name: Wait for deployment rollout
        run: |
          kubectl rollout status deployment/${{ env.HELM_RELEASE_NAME }} \
            --namespace genova-staging \
            --timeout=300s

      - name: Health check
        run: |
          STAGING_URL="https://staging.genova-genomics.org"
          for i in $(seq 1 10); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$STAGING_URL/health" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed (attempt $i)"
              exit 0
            fi
            echo "Health check attempt $i: HTTP $STATUS — retrying in 15s..."
            sleep 15
          done
          echo "Health check failed after 10 attempts"
          exit 1

      - name: Run smoke tests against staging
        run: |
          STAGING_URL="https://staging.genova-genomics.org"

          echo "Smoke test 1: API health endpoint"
          curl -sf "$STAGING_URL/health" | jq .

          echo "Smoke test 2: API readiness endpoint"
          curl -sf "$STAGING_URL/ready" | jq .

          echo "Smoke test 3: API version endpoint"
          curl -sf "$STAGING_URL/version" | jq .

          echo "Smoke test 4: Simple inference request"
          curl -sf -X POST "$STAGING_URL/api/v1/predict" \
            -H "Content-Type: application/json" \
            -d '{"sequence": "ATCGATCG", "task": "embedding"}' | jq .status

          echo "All smoke tests passed"

  # ── Deploy to Production ──────────────────────────────────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [release, deploy-staging]
    permissions:
      contents: read
    environment:
      name: production
      url: https://genova-genomics.org
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Configure kubectl for production
        uses: azure/k8s-set-context@v4
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.PRODUCTION_KUBECONFIG }}

      - name: Deploy to production via Helm
        id: deploy
        run: |
          helm upgrade --install ${{ env.HELM_RELEASE_NAME }} \
            ${{ env.HELM_CHART_PATH }} \
            --namespace genova-production \
            --create-namespace \
            --set image.repository=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }} \
            --set image.tag=${{ needs.release.outputs.version }} \
            --set environment=production \
            --set replicaCount=3 \
            --values ${{ env.HELM_CHART_PATH }}/values.yaml \
            --wait \
            --timeout 10m

      - name: Wait for deployment rollout
        run: |
          kubectl rollout status deployment/${{ env.HELM_RELEASE_NAME }} \
            --namespace genova-production \
            --timeout=300s

      - name: Health check
        run: |
          PROD_URL="https://genova-genomics.org"
          for i in $(seq 1 10); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$PROD_URL/health" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed (attempt $i)"
              exit 0
            fi
            echo "Health check attempt $i: HTTP $STATUS — retrying in 15s..."
            sleep 15
          done
          echo "Health check failed after 10 attempts"
          exit 1

      - name: Run production smoke tests
        id: smoke
        run: |
          PROD_URL="https://genova-genomics.org"

          echo "Smoke test 1: API health"
          curl -sf "$PROD_URL/health" | jq .

          echo "Smoke test 2: API readiness"
          curl -sf "$PROD_URL/ready" | jq .

          echo "Smoke test 3: API version — verify deployed version"
          DEPLOYED_VERSION=$(curl -sf "$PROD_URL/version" | jq -r .version)
          EXPECTED_VERSION="${{ needs.release.outputs.version }}"
          if [ "$DEPLOYED_VERSION" != "$EXPECTED_VERSION" ]; then
            echo "Version mismatch: deployed=$DEPLOYED_VERSION expected=$EXPECTED_VERSION"
            exit 1
          fi
          echo "Version verified: $DEPLOYED_VERSION"

          echo "Smoke test 4: Simple inference"
          curl -sf -X POST "$PROD_URL/api/v1/predict" \
            -H "Content-Type: application/json" \
            -d '{"sequence": "ATCGATCG", "task": "embedding"}' | jq .status

          echo "All production smoke tests passed"

      - name: Rollback on failure
        if: failure()
        run: |
          echo "Deployment or smoke tests failed — rolling back..."
          helm rollback ${{ env.HELM_RELEASE_NAME }} \
            --namespace genova-production \
            --wait \
            --timeout 5m
          echo "Rollback complete. Verifying health..."
          kubectl rollout status deployment/${{ env.HELM_RELEASE_NAME }} \
            --namespace genova-production \
            --timeout=300s
          echo "Rollback health check passed"
