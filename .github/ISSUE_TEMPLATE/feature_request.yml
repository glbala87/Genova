name: Feature Request
description: Suggest a new feature or enhancement for Genova
title: "[Feature]: "
labels: ["enhancement"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        We appreciate your ideas for improving Genova. Please describe the feature you have in mind.

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: |
        What problem does this feature solve? Is it related to a frustration
        or limitation you have encountered?
      placeholder: "I'm always frustrated when ..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the solution or behaviour you would like.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative approaches or workarounds you have considered.
    validations:
      required: false

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of Genova would this feature affect?
      options:
        - Model / Architecture
        - Training / Optimization
        - Data Loading / Preprocessing
        - Tokenization
        - API / Serving
        - CLI
        - Docker / Deployment
        - Documentation
        - Other
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: How important is this feature to your workflow?
      options:
        - Nice to have
        - Important
        - Critical / Blocking
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: |
        Add any other context, references, mockups, or code snippets that
        help explain the request.
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-submission Checklist
      options:
        - label: I have searched existing issues and feature requests to avoid duplicates.
          required: true
        - label: I am willing to contribute a PR for this feature (optional).
          required: false
