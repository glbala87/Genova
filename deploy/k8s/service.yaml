apiVersion: v1
kind: Service
metadata:
  name: genova-inference
  namespace: genova
  labels:
    app.kubernetes.io/name: genova
    app.kubernetes.io/component: inference
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: genova
    app.kubernetes.io/component: inference
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
---
