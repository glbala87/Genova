apiVersion: v1
kind: ConfigMap
metadata:
  name: genova-model-config
  namespace: genova
  labels:
    app.kubernetes.io/name: genova
    app.kubernetes.io/component: inference
data:
  # ---- Model architecture ----
  MODEL_ARCH: "transformer"
  MODEL_D_MODEL: "768"
  MODEL_N_HEADS: "12"
  MODEL_N_LAYERS: "12"
  MODEL_D_FF: "3072"
  MODEL_VOCAB_SIZE: "4096"
  MODEL_MAX_POSITION_EMBEDDINGS: "2048"

  # ---- Serving settings ----
  MODEL_WEIGHTS_PATH: "/models/genova/weights.pt"
  TOKENIZER_PATH: "/models/genova/tokenizer.json"
  BATCH_SIZE: "32"
  MAX_SEQUENCE_LENGTH: "2048"
  MIXED_PRECISION: "fp16"

  # ---- Server settings ----
  SERVER_HOST: "0.0.0.0"
  SERVER_PORT: "8000"
  SERVER_WORKERS: "1"
  LOG_LEVEL: "info"

  # ---- Feature flags ----
  ENABLE_FLASH_ATTENTION: "true"
  ENABLE_TORCH_COMPILE: "false"
  ENABLE_QUANTIZATION: "false"
  QUANTIZATION_BITS: "8"
