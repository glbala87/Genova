apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: genova-inference-hpa
  namespace: genova
  labels:
    app.kubernetes.io/name: genova
    app.kubernetes.io/component: inference
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: genova-inference
  minReplicas: 2
  maxReplicas: 10
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
  metrics:
    # Scale on GPU utilization (requires DCGM exporter + custom metrics adapter)
    - type: Pods
      pods:
        metric:
          name: DCGM_FI_DEV_GPU_UTIL
        target:
          type: AverageValue
          averageValue: "70"
    # Scale on request latency (requires Prometheus adapter)
    - type: Pods
      pods:
        metric:
          name: genova_request_latency_p95_seconds
        target:
          type: AverageValue
          averageValue: "2"
    # Also consider CPU as a fallback metric
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 80
